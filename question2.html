<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Picasso Round Table - 質問カード</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }


    h1 {
      font-size: 3.5em;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      font-weight: bold;
      letter-spacing: 2px;
      z-index: 10;
    }

    .tagline {
      font-size: 1.2em;
      color: #fff;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      font-style: italic;
      z-index: 10;
    }

    button {
      padding: 18px 40px;
      font-size: 20px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: 3px solid #fff;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 10;
      position: relative;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
    }

    button:active {
      transform: translateY(0) scale(1);
    }

    #loading {
      display: none;
      font-size: 20px;
      color: #fff;
      margin-top: 30px;
      animation: blink 1s infinite;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      font-weight: bold;
      z-index: 10;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    #question {
      opacity: 0;
      transform: scale(0.8) rotateY(0deg);
      margin-top: 40px;
      font-size: 2em;
      color: #2c3e50;
      max-width: 700px;
      text-align: center;
      line-height: 1.6;
      min-height: 100px;
      padding: 30px 40px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      border: 5px solid transparent;
      border-image: linear-gradient(135deg, #f093fb, #f5576c, #4facfe) 1;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.5);
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 10;
      position: relative;
      font-weight: 500;
    }


    #question.show {
      opacity: 1;
      transform: scale(1.05) rotateY(360deg);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9em;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
      z-index: 10;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>🎨 Picasso Round Table</h1>
  <div class="tagline">AI × 対話の力でつながる</div>

  <button onclick="showRandomQuestion()">次の質問を表示</button>

  <div id="loading">質問を選んでいます…</div>
  <div id="question"></div>

  <footer>Powered by AI × ファシリテーション</footer>

  <script>
    const allQuestions = [
      "最近、ちょっと嬉しかったことは？",
      "困ったときに助けてもらった経験は？",
      "今チャレンジしていることは何？",
      "チームの強みは何だと思いますか？",
      "これから社長に期待することは？",
      "生成AIを使ってみたい場面は？",
      "他部門と連携してうまくいったことは？",
      "最近、自分が成長したと感じた瞬間は？",
      "好きな果物を教えてください（津田）"
    ];

    let remainingQuestions = [...allQuestions];

    function showRandomQuestion() {
      const questionBox = document.getElementById("question");
      const loading = document.getElementById("loading");

      // アニメーションをリセット
      questionBox.classList.remove("show");
      questionBox.innerText = "";
      loading.style.display = "block";

      setTimeout(() => {
        loading.style.display = "none";

        if (remainingQuestions.length === 0) {
          questionBox.innerText = "すべての質問が表示されました！";
          questionBox.classList.add("show");
          return;
        }

        const index = Math.floor(Math.random() * remainingQuestions.length);
        const selected = remainingQuestions.splice(index, 1)[0];

        questionBox.innerText = selected;
        questionBox.classList.add("show");
      }, 1000);
    }
  </script>

</body>
</html>
